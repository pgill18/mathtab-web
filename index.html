<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Times Table Gym</title>
  <link rel="stylesheet" href="style.css?v=22">
  <script>
    /* Pre-paint theme bootstrap: apply the active profile's saved theme before
       first paint so there's no flash of the base look. Base "hall" = no attr. */
    (function () {
      try {
        var a = localStorage.getItem("ttg.active") || "";
        var t = localStorage.getItem("ttg.theme." + a) || "hall";
        if (t && t !== "hall") document.documentElement.dataset.theme = t;
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <header>
    <div class="brand">Times Table Gym <span class="lvl">L2</span></div>
    <div class="profile">
      <label>Profile:
        <select id="profileSelect" aria-label="Active profile"></select>
      </label>
      <button id="newProfileBtn" type="button">+ New</button>
    </div>
  </header>

  <nav id="nav" aria-label="Main">
    <button data-view="gym" type="button">Gym</button>
    <button data-view="play" type="button">Play</button>
    <button data-view="twoplayer" type="button">Two-player</button>
    <button data-view="rivals" type="button">Rivals</button>
    <button data-view="lessons" type="button">Lessons</button>
    <button data-view="puzzles" type="button">Puzzles</button>
    <button data-view="settings" type="button">Settings</button>
  </nav>

  <main id="view" aria-live="polite"></main>

  <footer>
    <span>Full 2&ndash;25 grid. Data stays in this browser (localStorage), one profile at a time.</span>
  </footer>

  <script src="lessons.js?v=22"></script>
  <script src="rivals.js?v=22"></script>
  <script src="gamification.js?v=22"></script>
  <script src="engine.js?v=22"></script>
  <script src="app.js?v=22"></script>
</body>
</html>
